name: Audit PR Reviews

# Runs after a PR is merged (or via manual dispatch) and asks Claude to identify
# review suggestions that were NOT applied in the final merged code. Produces
# at most one follow-up issue per PR, or none if everything was addressed.

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to audit'
        required: true
        type: string

jobs:
  audit:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Validate PR number
        run: |
          if ! [[ "$PR_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::PR_NUMBER must be a positive integer (got: '$PR_NUMBER')"
            exit 1
          fi

      - name: Ensure labels exist
        run: |
          gh label create audited          --description "PR has been reviewed in audit" --color 0E8A16 2>/dev/null || true
          gh label create audit            --description "Issue from PR audit"           --color D93F0B 2>/dev/null || true
          gh label create review-followup  --description "Follow-up from code review"    --color FBCA04 2>/dev/null || true

      - name: Skip if already audited
        id: check
        run: |
          if gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name' | grep -qx audited; then
            echo "PR #$PR_NUMBER already audited — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Load secrets from 1Password
        if: steps.check.outputs.skip != 'true'
        uses: 1password/load-secrets-action@2bfca7363ef8f96bb66d38dd50981bf948040c7e # v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: op://Dev/CLAUDE_CODE_OAUTH_TOKEN/credential

      - name: Audit PR reviews with Claude
        if: steps.check.outputs.skip != 'true'
        uses: anthropics/claude-code-action@e30d45253b1abcc29a121ab35b8bf156061582bd # v1
        with:
          claude_code_oauth_token: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: false
          prompt: |
            You are auditing merged PR #${{ env.PR_NUMBER }} in ${{ github.repository }} for
            review suggestions that were NOT applied in the final merged code.

            ## Steps

            1. Fetch every Claude review body for this PR:
               - `gh api repos/${{ github.repository }}/issues/${{ env.PR_NUMBER }}/comments --paginate`
               - `gh api repos/${{ github.repository }}/pulls/${{ env.PR_NUMBER }}/comments --paginate`
               - `gh api repos/${{ github.repository }}/pulls/${{ env.PR_NUMBER }}/reviews --paginate`
               Keep only entries by `github-actions[bot]` whose body contains both "PR Review"
               or "Claude finished" AND "actions/runs/". Ignore everything else.

            2. Fetch the merged diff:
               `gh pr diff ${{ env.PR_NUMBER }}`

            3. Extract candidate suggestions from those review bodies. For each candidate,
               READ the relevant file in the merged tree (current HEAD) and confirm whether
               the suggested change was applied.

            ## What counts as a suggestion (INCLUDE)

            - Bugs the reviewer identified with a specific fix
            - Missing error handling / validation the reviewer asked for
            - Refactors or renames with concrete before/after
            - Nits that propose a specific edit at a specific location

            ## What does NOT count (EXCLUDE — these are the main false positives)

            - Praise ("nice", "good call", "exactly right", "this is what it should be doing")
            - Neutral observations, rhetorical questions, or analysis without a request
            - Items already applied in the merged diff or in a follow-up commit on `main`
            - Items the PR author explicitly responded to with reasoning (accepted or rejected)
            - Anything you cannot verify as unaddressed by reading the current code

            ## Verification rule

            Never flag a suggestion without reading the file and confirming the change is
            absent. If you cannot verify from the code that it's unaddressed, DROP IT.
            False negatives are strongly preferred over false positives — the goal is signal,
            not volume. Zero findings is the expected answer for most PRs.

            ## Output

            Write a JSON file at `${{ github.workspace }}/audit-result.json` with exactly
            this schema (no prose, no markdown):

            {
              "pr_number": <number>,
              "unaddressed": [
                {
                  "severity": "high" | "medium" | "low",
                  "file": "<path from repo root>",
                  "line": <number or null>,
                  "summary": "<one sentence>",
                  "quote": "<verbatim from reviewer, ≤200 chars>",
                  "evidence": "<one sentence: what you read in the code that proves it wasn't applied>"
                }
              ]
            }

            If nothing qualifies, write `{"pr_number": <N>, "unaddressed": []}`.

            Do NOT create issues. Do NOT comment on the PR. Only write the JSON file.

          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "Bash(gh api*),Bash(gh pr view*),Bash(gh pr diff*),Bash(git log*),Bash(git show*),Read,Grep,Glob,Write"
            --disallowedTools "Bash(gh pr review*),Bash(gh pr merge*),Bash(gh pr close*),Bash(gh issue*),Bash(gh pr comment*)"

      - name: Upload audit artifact
        if: always() && steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: audit-result-pr-${{ env.PR_NUMBER }}
          path: audit-result.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Create follow-up issue if suggestions remain
        if: steps.check.outputs.skip != 'true'
        run: |
          # Missing or malformed output means the audit didn't complete.
          # Fail the step so the "audited" label isn't applied and the run
          # can be retried via workflow_dispatch.
          if [ ! -f audit-result.json ]; then
            echo "::error::audit-result.json not produced — Claude step did not complete the audit contract."
            exit 1
          fi

          if ! jq -e '.unaddressed | type == "array"' audit-result.json >/dev/null 2>&1; then
            echo "::error::audit-result.json is missing or has an invalid 'unaddressed' array."
            cat audit-result.json
            exit 1
          fi

          COUNT=$(jq '.unaddressed | length' audit-result.json)
          echo "Unaddressed suggestions: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            exit 0
          fi

          PR_TITLE=$(gh pr view "$PR_NUMBER" --json title --jq .title)

          {
            echo "## Unaddressed review suggestions from PR #$PR_NUMBER"
            echo
            echo "**PR title:** $PR_TITLE"
            echo
            jq -r '.unaddressed[] | "### \(.severity | ascii_upcase): \(.summary)\n\n- **File:** `\(.file)`\(if .line then ":\(.line|tostring)" else "" end)\n- **Reviewer said:** > \(.quote)\n- **Evidence not applied:** \(.evidence)\n"' audit-result.json
            echo
            echo "---"
            echo "_Produced by the PR review audit workflow. Close if not actionable._"
          } > issue-body.md

          gh issue create \
            --title "[Audit] Unaddressed suggestions from PR #$PR_NUMBER" \
            --body-file issue-body.md \
            --label "audit,review-followup"

      - name: Mark PR as audited
        if: steps.check.outputs.skip != 'true' && success()
        run: gh pr edit "$PR_NUMBER" --add-label audited
